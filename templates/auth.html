<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | VSN Analysis</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-card: #16161f;
            --bg-input: #0f0f15;
            --text-primary: #f0f0f0;
            --text-secondary: #888899;
            --accent-green: #00ff88;
            --accent-green-dim: rgba(0, 255, 136, 0.1);
            --accent-red: #ff4466;
            --border-color: #2a2a3a;
            --border-hover: #3a3a4a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* Animated Logo Pattern Background */
        .pattern-bg {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .pattern-layer {
            position: absolute;
            width: 300%;
            height: 300%;
            top: -100%;
            left: -100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cellipse cx='50' cy='20' rx='12' ry='20' fill='%2366ccff' opacity='0.08'/%3E%3Cellipse cx='20' cy='35' rx='12' ry='20' fill='%23ff69b4' opacity='0.08' transform='rotate(-45 20 35)'/%3E%3Cellipse cx='80' cy='35' rx='12' ry='20' fill='%23b088f9' opacity='0.08' transform='rotate(45 80 35)'/%3E%3Cellipse cx='25' cy='70' rx='12' ry='20' fill='%23ffaa66' opacity='0.08' transform='rotate(-30 25 70)'/%3E%3Cellipse cx='75' cy='70' rx='12' ry='20' fill='%23ffee66' opacity='0.08' transform='rotate(30 75 70)'/%3E%3Cellipse cx='50' cy='95' rx='12' ry='25' fill='%23c4e538' opacity='0.08'/%3E%3Cellipse cx='50' cy='45' rx='8' ry='8' fill='%23ff69b4' opacity='0.08'/%3E%3C/svg%3E");
            background-size: 80px 96px;
            background-repeat: repeat;
            transform: rotate(-15deg);
        }

        .pattern-layer.layer-1 {
            animation: driftUpRight 120s linear infinite;
        }

        .pattern-layer.layer-2 {
            animation: driftDownLeft 150s linear infinite;
            opacity: 0.45;
        }

        @keyframes driftUpRight {
            from {
                transform: rotate(-15deg) translate(0, 0);
            }
            to {
                transform: rotate(-15deg) translate(800px, -600px);
            }
        }

        @keyframes driftDownLeft {
            from {
                transform: rotate(-15deg) translate(0, 0);
            }
            to {
                transform: rotate(-15deg) translate(-800px, 600px);
            }
        }


        .pattern-layer {
            filter: saturate(0.85);
        }

        @media (prefers-reduced-motion: reduce) {
            .pattern-layer {
                animation: none;
            }
        }

        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent-green);
        }

        .tab-switcher {
            display: flex;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
        }

        .tab {
            flex: 1;
            padding: 0.75rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab.active {
            background: var(--accent-green);
            color: var(--bg-primary);
        }

        .tab:not(.active):hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .oauth-section {
            margin-bottom: 1.5rem;
        }

        .oauth-btn {
            width: 100%;
            padding: 0.875rem 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .oauth-btn:hover {
            border-color: var(--border-hover);
            background: rgba(255, 255, 255, 0.03);
        }

        .oauth-btn svg {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .form-group input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* OTP Input Styling */
        .otp-container {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .otp-input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 1.5rem;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            transition: border-color 0.2s ease;
        }

        .otp-input:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .submit-btn {
            width: 100%;
            padding: 0.875rem;
            margin-top: 0.5rem;
            background: var(--accent-green);
            border: none;
            color: var(--bg-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: filter 0.2s ease;
        }

        .submit-btn:hover {
            filter: brightness(1.1);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .secondary-btn {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.75rem;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .secondary-btn:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        .error-message {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: rgba(255, 68, 102, 0.1);
            border: 1px solid rgba(255, 68, 102, 0.3);
            color: var(--accent-red);
            font-size: 0.85rem;
            display: none;
        }

        .success-message {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: var(--accent-green-dim);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: var(--accent-green);
            font-size: 0.85rem;
            display: none;
        }

        .info-message {
            margin-bottom: 1.5rem;
            padding: 0.75rem 1rem;
            background: rgba(100, 100, 255, 0.1);
            border: 1px solid rgba(100, 100, 255, 0.3);
            color: #aaaaff;
            font-size: 0.85rem;
            text-align: center;
        }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .footer-text a {
            color: var(--accent-green);
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .resend-timer {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .resend-link {
            color: var(--accent-green);
            cursor: pointer;
            text-decoration: none;
        }

        .resend-link:hover {
            text-decoration: underline;
        }

        .resend-link.disabled {
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        /* Hide views by default */
        .view { display: none; }
        .view.active { display: block; }

        @media (max-width: 480px) {
            .auth-card {
                padding: 1.5rem;
            }
            .otp-input {
                width: 40px;
                height: 48px;
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="pattern-bg">
        <div class="pattern-layer layer-1"></div>
        <div class="pattern-layer layer-2"></div>
    </div>    

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <h1>VSN <span>Analysis</span></h1>
            </div>

            <!-- ==================== -->
            <!-- MAIN AUTH VIEW -->
            <!-- ==================== -->
            <div class="view active" id="mainAuthView">
                <div class="tab-switcher">
                    <button type="button" class="tab active" id="loginTab">Sign In</button>
                    <button type="button" class="tab" id="signupTab">Create Account</button>
                </div>

                <div class="oauth-section">
                    <button type="button" class="oauth-btn" id="googleBtn">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Continue with Google
                    </button>
                </div>

                <div class="divider">or</div>

                <form id="authForm">
                    <div class="form-group" id="displayNameGroup" style="display:none;">
                        <label for="displayName">Username</label>
                        <input type="text" id="displayName" placeholder="e.g. jsmith2025" maxlength="30">
                        <div id="usernameError" class="error-message" style="display:none;"></div>
                    </div>

                    <div class="form-group">
                        <label for="email" id="emailLabel">Email or Username</label>
                        <input type="text" id="email" placeholder="you@example.com or username" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required minlength="6">
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span id="submitText">Sign In</span>
                    </button>
                </form>

                <div style="text-align:right; margin-top:0.25rem;">
                    <a href="#" id="forgotPasswordLink"
                    style="font-size:0.8rem;color:var(--accent-green);text-decoration:none;">
                        Forgot password?
                    </a>
                </div>

                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>

                <div class="footer-text">
                    <a href="/">← Back to home</a>
                </div>
            </div>

            <!-- ==================== -->
            <!-- OTP VERIFICATION VIEW -->
            <!-- ==================== -->
            <div class="view" id="otpView">
                <div class="info-message">
                    We sent a 6-digit code to<br>
                    <strong id="otpEmail"></strong>
                </div>

                <form id="otpForm">
                    <label style="display: block; text-align: center; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--text-secondary);">
                        Enter verification code
                    </label>
                    <div class="otp-container">
                        <input type="text" class="otp-input" maxlength="1" data-index="0" inputmode="numeric" pattern="[0-9]*">
                        <input type="text" class="otp-input" maxlength="1" data-index="1" inputmode="numeric" pattern="[0-9]*">
                        <input type="text" class="otp-input" maxlength="1" data-index="2" inputmode="numeric" pattern="[0-9]*">
                        <input type="text" class="otp-input" maxlength="1" data-index="3" inputmode="numeric" pattern="[0-9]*">
                        <input type="text" class="otp-input" maxlength="1" data-index="4" inputmode="numeric" pattern="[0-9]*">
                        <input type="text" class="otp-input" maxlength="1" data-index="5" inputmode="numeric" pattern="[0-9]*">
                    </div>

                    <button type="submit" class="submit-btn" id="verifyBtn">
                        <span id="verifyText">Verify Email</span>
                    </button>
                </form>

                <div class="resend-timer" id="resendTimer">
                    Didn't receive the code? <span class="resend-link disabled" id="resendLink">Resend in <span id="countdown">60</span>s</span>
                </div>

                <button type="button" class="secondary-btn" id="backToAuthBtn">← Back</button>

                <div class="error-message" id="otpErrorMessage"></div>
                <div class="success-message" id="otpSuccessMessage"></div>
            </div>

            <div class="view" id="resetView">
                <div class="info-message">
                    Enter your email and we’ll send a reset link.
                </div>

                <form id="resetForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="resetEmail" required>
                    </div>

                    <button class="submit-btn">Send Reset Link</button>
                </form>

                <div class="success-message" id="resetSuccess"></div>
                <div class="error-message" id="resetError"></div>

                <button class="secondary-btn" id="backToLoginBtn">← Back</button>
            </div>

        </div>
    </div>

    <!-- Load Supabase library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded');
            
            // ============================================
            // SUPABASE CONFIGURATION
            // ============================================
            var SUPABASE_URL = 'https://wtxxnhjknjwmlsqxdovv.supabase.co';
            var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0eHhuaGprbmp3bWxzcXhkb3Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU5NTY2MDQsImV4cCI6MjA4MTUzMjYwNH0.5gBkeZj8JOo2GEQ1AOmsarLV5WJ1-pZUZbDwbChgZPw';
            
            console.log('Initializing Supabase...');
            
            var supabaseClient;
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('Supabase initialized successfully');
            } catch (e) {
                console.error('Failed to initialize Supabase:', e);
                showError('Failed to initialize authentication');
                return;
            }

            // ============================================
            // STATE
            // ============================================
            var currentMode = 'login';
            var usernameAvailable = false;
            var pendingEmail = '';
            var pendingUsername = '';
            var resendCountdown = 0;
            var countdownInterval = null;

            // ============================================
            // GET ELEMENTS - Main Auth View
            // ============================================
            var loginTab = document.getElementById('loginTab');
            var signupTab = document.getElementById('signupTab');
            var googleBtn = document.getElementById('googleBtn');
            var authForm = document.getElementById('authForm');
            var submitBtn = document.getElementById('submitBtn');
            var submitText = document.getElementById('submitText');
            var emailInput = document.getElementById('email');
            var displayNameInput = document.getElementById('displayName');
            var displayNameGroup = document.getElementById('displayNameGroup');
            var passwordInput = document.getElementById('password');
            var errorMessageEl = document.getElementById('errorMessage');
            var successMessageEl = document.getElementById('successMessage');

            // GET ELEMENTS - OTP View
            var mainAuthView = document.getElementById('mainAuthView');
            var otpView = document.getElementById('otpView');
            var otpEmailEl = document.getElementById('otpEmail');
            var otpForm = document.getElementById('otpForm');
            var otpInputs = document.querySelectorAll('.otp-input');
            var verifyBtn = document.getElementById('verifyBtn');
            var verifyText = document.getElementById('verifyText');
            var resendLink = document.getElementById('resendLink');
            var countdownEl = document.getElementById('countdown');
            var backToAuthBtn = document.getElementById('backToAuthBtn');
            var otpErrorMessage = document.getElementById('otpErrorMessage');
            var otpSuccessMessage = document.getElementById('otpSuccessMessage');

            // ============================================
            // GET ELEMENTS - Reset Password View
            // ============================================
            var forgotPasswordLink = document.getElementById('forgotPasswordLink');
            var resetView = document.getElementById('resetView');
            var resetForm = document.getElementById('resetForm');
            var resetEmailInput = document.getElementById('resetEmail');
            var resetSuccess = document.getElementById('resetSuccess');
            var resetError = document.getElementById('resetError');
            var backToLoginBtn = document.getElementById('backToLoginBtn');

            // ============================================
            // VIEW MANAGEMENT
            // ============================================
            function clearAllMessages() {
                hideMessages();
                hideOtpMessages();
                resetSuccess.style.display = 'none';
                resetError.style.display = 'none';
            }

            function showView(viewId) {
                mainAuthView.classList.remove('active');
                otpView.classList.remove('active');
                resetView.classList.remove('active');

                document.getElementById(viewId).classList.add('active');
            }

            function showOtpView(email) {
                pendingEmail = email;
                otpEmailEl.textContent = email;
                showView('otpView');
                otpInputs[0].focus();
                startResendCountdown();
            }

            function showMainView() {
                showView('mainAuthView');
                clearOtpInputs();
                stopResendCountdown();
            }

            // ============================================
            // UI HELPERS
            // ============================================
            function showError(message) {
                errorMessageEl.textContent = message;
                errorMessageEl.style.display = 'block';
                successMessageEl.style.display = 'none';
            }

            function showSuccess(message) {
                successMessageEl.textContent = message;
                successMessageEl.style.display = 'block';
                errorMessageEl.style.display = 'none';
            }

            function hideMessages() {
                errorMessageEl.style.display = 'none';
                successMessageEl.style.display = 'none';
            }

            function showOtpError(message) {
                otpErrorMessage.textContent = message;
                otpErrorMessage.style.display = 'block';
                otpSuccessMessage.style.display = 'none';
            }

            function showOtpSuccess(message) {
                otpSuccessMessage.textContent = message;
                otpSuccessMessage.style.display = 'block';
                otpErrorMessage.style.display = 'none';
            }

            function hideOtpMessages() {
                otpErrorMessage.style.display = 'none';
                otpSuccessMessage.style.display = 'none';
            }

            // ============================================
            // OTP INPUT HANDLING
            // ============================================
            function clearOtpInputs() {
                otpInputs.forEach(input => input.value = '');
            }

            function getOtpValue() {
                return Array.from(otpInputs).map(input => input.value).join('');
            }

            otpInputs.forEach((input, index) => {
                input.addEventListener('input', function(e) {
                    var value = e.target.value;
                    
                    // Only allow numbers
                    if (!/^\d*$/.test(value)) {
                        e.target.value = '';
                        return;
                    }

                    // Move to next input
                    if (value && index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }

                    // Auto-submit when all filled
                    if (getOtpValue().length === 6) {
                        otpForm.dispatchEvent(new Event('submit'));
                    }
                });

                input.addEventListener('keydown', function(e) {
                    // Handle backspace
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        otpInputs[index - 1].focus();
                    }
                });

                // Handle paste
                input.addEventListener('paste', function(e) {
                    e.preventDefault();
                    var pastedData = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
                    
                    pastedData.split('').forEach((char, i) => {
                        if (otpInputs[i]) {
                            otpInputs[i].value = char;
                        }
                    });

                    // Focus last filled or next empty
                    var focusIndex = Math.min(pastedData.length, otpInputs.length - 1);
                    otpInputs[focusIndex].focus();

                    // Auto-submit if complete
                    if (pastedData.length === 6) {
                        otpForm.dispatchEvent(new Event('submit'));
                    }
                });
            });

            // ============================================
            // RESEND COUNTDOWN
            // ============================================
            function startResendCountdown() {
                resendCountdown = 60;
                updateCountdownDisplay();
                resendLink.classList.add('disabled');
                
                countdownInterval = setInterval(function() {
                    resendCountdown--;
                    updateCountdownDisplay();
                    
                    if (resendCountdown <= 0) {
                        stopResendCountdown();
                        resendLink.classList.remove('disabled');
                        resendLink.textContent = 'Resend code';
                    }
                }, 1000);
            }

            function stopResendCountdown() {
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
            }

            function updateCountdownDisplay() {
                if (resendCountdown > 0) {
                    resendLink.innerHTML = 'Resend in <span id="countdown">' + resendCountdown + '</span>s';
                }
            }

            // ============================================
            // RESEND CODE
            // ============================================
            resendLink.addEventListener('click', async function() {
                if (resendLink.classList.contains('disabled')) return;
                
                hideOtpMessages();
                resendLink.textContent = 'Sending...';
                
                try {
                    var result = await supabaseClient.auth.resend({
                        type: 'signup',
                        email: pendingEmail
                    });

                    if (result.error) throw result.error;

                    showOtpSuccess('New code sent!');
                    startResendCountdown();
                } catch (error) {
                    console.error('Resend error:', error);
                    showOtpError(error.message || 'Failed to resend code');
                    resendLink.textContent = 'Resend code';
                }
            });

            // ============================================
            // BACK BUTTON
            // ============================================
            backToAuthBtn.addEventListener('click', function() {
                showMainView();
                hideMessages();
            });

            // ============================================
            // SYNC SESSION TO FLASK
            // ============================================
            async function syncSessionToFlask(session) {
                console.log('Syncing session to Flask...');
                try {
                    var response = await fetch('/api/auth/session', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            access_token: session.access_token,
                            refresh_token: session.refresh_token
                        })
                    });
                    
                    var result = await response.json();
                    console.log('Flask session sync result:', result);
                    
                    if (!response.ok) {
                        throw new Error(result.error || 'Failed to sync session');
                    }
                    
                    return true;
                } catch (e) {
                    console.error('Failed to sync session to Flask:', e);
                    return false;
                }
            }

            // ============================================
            // CLAIM USERNAME
            // ============================================
            async function claimUsername(username, accessToken) {
                try {
                    const res = await fetch('/api/claim_username', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${accessToken}`
                        },
                        body: JSON.stringify({ username })
                    });
                    return res.ok;
                } catch (e) {
                    console.error('Error claiming username:', e);
                    return false;
                }
            }

            async function userHasUsername(accessToken) {
                try {
                    var res = await fetch('/api/auth/user', {
                        headers: { 'Authorization': 'Bearer ' + accessToken }
                    });
                    var data = await res.json();
                    return !!(data.authenticated && data.user && data.user.username);
                } catch (e) {
                    console.error('Username check failed:', e);
                    return true;
                }
            }

            async function finishAuthenticatedSession(session, fallbackRedirect) {
                var synced = await syncSessionToFlask(session);
                if (!synced) {
                    throw new Error('Could not finish sign-in. Please try again.');
                }

                var hasUsername = await userHasUsername(session.access_token);
                if (!hasUsername) {
                    window.location.href = '/auth/callback';
                    return;
                }

                var redirectTo = sessionStorage.getItem('auth_redirect') || fallbackRedirect || '/index';
                sessionStorage.removeItem('auth_redirect');
                window.location.href = redirectTo;
            }

            // ============================================
            // TAB SWITCHING
            // ============================================
            var emailLabel = document.getElementById('emailLabel');
            
            loginTab.addEventListener('click', function() {
                console.log('Login tab clicked');
                currentMode = 'login';
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                displayNameGroup.style.display = 'none';
                submitText.textContent = 'Sign In';
                emailLabel.textContent = 'Email or Username';
                emailInput.placeholder = 'you@example.com or username';
                emailInput.type = 'text';
                hideMessages();
            });

            signupTab.addEventListener('click', function() {
                console.log('Signup tab clicked');
                currentMode = 'signup';
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
                displayNameGroup.style.display = 'block';
                submitText.textContent = 'Create Account';
                emailLabel.textContent = 'Email';
                emailInput.placeholder = 'you@example.com';
                emailInput.type = 'email';
                hideMessages();
            });

            // ============================================
            // GOOGLE OAUTH
            // ============================================
            googleBtn.addEventListener('click', async function() {
                console.log('Google button clicked');
                hideMessages();
                
                try {
                    console.log('Starting Google OAuth...');
                    var result = await supabaseClient.auth.signInWithOAuth({
                        provider: 'google',
                        options: {
                            redirectTo: window.location.origin + '/auth/callback'
                        }
                    });

                    console.log('OAuth response:', result);

                    if (result.error) {
                        throw result.error;
                    }
                    
                    console.log('Redirecting to Google...');
                } catch (error) {
                    console.error('Google sign in error:', error);
                    showError(error.message || 'Failed to sign in with Google');
                }
            });

            // ============================================
            // USERNAME AVAILABILITY CHECK
            // ============================================
            const usernameInput = document.getElementById('displayName');
            const usernameError = document.getElementById('usernameError');

            usernameInput.addEventListener('input', () => {
                usernameAvailable = false;
                usernameError.style.display = 'none';
            });

            usernameInput.addEventListener('blur', async () => {
                const username = usernameInput.value.trim();

                if (!username) {
                    usernameAvailable = false;
                    return;
                }

                const res = await fetch(
                    `/api/username_available?username=${encodeURIComponent(username)}`
                );
                const data = await res.json();

                if (!data.available) {
                    usernameAvailable = false;
                    usernameError.textContent = 'That username is already taken';
                    usernameError.style.display = 'block';
                } else {
                    usernameAvailable = true;
                    usernameError.style.display = 'none';
                }
            });

            // ============================================
            // EMAIL/PASSWORD AUTH
            // ============================================
            authForm.addEventListener('submit', async function(event) {
                event.preventDefault();
                console.log('Form submitted, mode:', currentMode);
                
                var email = emailInput.value.trim();
                var password = passwordInput.value;
                
                console.log('Email:', email);
                
                hideMessages();
                
                // Show loading state
                submitBtn.disabled = true;
                submitText.innerHTML = '<span class="loading-spinner"></span>';

                try {
                    if (currentMode === 'signup') {
                        console.log('Attempting signup...');
                        var displayName = displayNameInput.value.trim();
                        if (!displayName) {
                            showError('Please enter a username.');
                            submitBtn.disabled = false;
                            submitText.textContent = 'Create Account';
                            return;
                        }

                        // Check availability if not already confirmed
                        if (!usernameAvailable) {
                            const res = await fetch(`/api/username_available?username=${encodeURIComponent(displayName)}`);
                            const data = await res.json();
                            if (!data.available) {
                                showError('That username is already taken.');
                                submitBtn.disabled = false;
                                submitText.textContent = 'Create Account';
                                return;
                            }
                            usernameAvailable = true;
                        }

                        // Store username for after verification
                        pendingUsername = displayName;

                        // Sign up with OTP email verification
                        var signupResult = await supabaseClient.auth.signUp({
                            email: email,
                            password: password,
                            options: {
                                emailRedirectTo: window.location.origin + '/auth/callback',
                                data: {
                                    display_name: displayName,
                                    username: displayName
                                }
                            }
                        });

                        console.log('Signup response:', signupResult);

                        if (signupResult.error) throw signupResult.error;

                        var data = signupResult.data;
                        if (data.user && data.user.identities && data.user.identities.length === 0) {
                            showError('An account with this email already exists.');
                        } else if (data.user && !data.session) {
                            showSuccess('Account created. Check your email to confirm your account, then we will finish your username setup.');
                        } else if (data.session) {
                            // Auto-confirmed (shouldn't happen with email confirmation enabled)
                            console.log('Auto-confirmed, syncing and redirecting...');
                            await claimUsername(displayName, data.session.access_token);
                            await finishAuthenticatedSession(data.session, '/index');
                        }
                    } else {
                        console.log('Attempting login...');
                        
                        // Check if input is email or username
                        var loginEmail = email;
                        var isEmail = email.includes('@');
                        
                        if (!isEmail) {
                            // It's a username - look up the email
                            console.log('Username detected, looking up email...');
                            var lookupRes = await fetch(`/api/lookup_email_by_username?username=${encodeURIComponent(email)}`);
                            var lookupData = await lookupRes.json();
                            
                            if (!lookupRes.ok || lookupData.error) {
                                throw new Error('Username not found. Please check your username or use your email.');
                            }
                            
                            loginEmail = lookupData.email;
                            console.log('Found email for username');
                        }
                        
                        var loginResult = await supabaseClient.auth.signInWithPassword({
                            email: loginEmail,
                            password: password
                        });

                        console.log('Login response:', loginResult);

                        if (loginResult.error) throw loginResult.error;

                        console.log('Login successful, finishing session...');
                        await finishAuthenticatedSession(loginResult.data.session, '/index');
                    }
                } catch (error) {
                    console.error('Auth error:', error);
                    showError(error.message || 'Authentication failed');
                } finally {
                    submitBtn.disabled = false;
                    submitText.textContent = currentMode === 'login' ? 'Sign In' : 'Create Account';
                }
            });

            // ============================================
            // OTP VERIFICATION
            // ============================================
            otpForm.addEventListener('submit', async function(event) {
                event.preventDefault();
                
                var otp = getOtpValue();
                
                if (otp.length !== 6) {
                    showOtpError('Please enter all 6 digits');
                    return;
                }

                hideOtpMessages();
                verifyBtn.disabled = true;
                verifyText.innerHTML = '<span class="loading-spinner"></span>';

                try {
                    console.log('Verifying OTP for:', pendingEmail);
                    
                    var result = await supabaseClient.auth.verifyOtp({
                        email: pendingEmail,
                        token: otp,
                        type: 'signup'
                    });

                    console.log('OTP verification result:', result);

                    if (result.error) throw result.error;

                    if (result.data.session) {
                        console.log('OTP verified, syncing session...');
                        
                        // Claim the username
                        if (pendingUsername) {
                            console.log('Claiming username:', pendingUsername);
                            await claimUsername(pendingUsername, result.data.session.access_token);
                        }
                        
                        showOtpSuccess('Email verified! Redirecting...');
                        setTimeout(() => {
                            finishAuthenticatedSession(result.data.session, '/index');
                        }, 1000);
                    }
                } catch (error) {
                    console.error('OTP verification error:', error);
                    showOtpError(error.message || 'Invalid or expired code');
                    clearOtpInputs();
                    otpInputs[0].focus();
                } finally {
                    verifyBtn.disabled = false;
                    verifyText.textContent = 'Verify Email';
                }
            });

            forgotPasswordLink.addEventListener('click', (e) => {
                e.preventDefault();
                clearAllMessages();
                showView('resetView');
            });

            backToLoginBtn.addEventListener('click', () => {
                clearAllMessages();
                showView('mainAuthView');
            });


        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            resetSuccess.style.display = 'none';
            resetError.style.display = 'none';

            try {
                const { error } = await supabaseClient.auth.resetPasswordForEmail(
                    resetEmailInput.value,
                    {
                        redirectTo: window.location.origin + '/auth/reset'
                    }
                );

                if (error) throw error;

                resetSuccess.textContent = 'Check your email for a reset link.';
                resetSuccess.style.display = 'block';
            } catch (err) {
                resetError.textContent = err.message || 'Failed to send reset email.';
                resetError.style.display = 'block';
            }
        });



            // ============================================
            // CHECK EXISTING SESSION
            // ============================================
            async function checkSession() {
                console.log('Checking existing session...');
                try {
                    var sessionResult = await supabaseClient.auth.getSession();
                    console.log('Session check result:', sessionResult);
                    if (sessionResult.data.session) {
                        console.log('Already logged in, finishing session...');
                        await finishAuthenticatedSession(sessionResult.data.session, '/index');
                    }
                } catch (e) {
                    console.error('Session check error:', e);
                }
            }

            checkSession();
        });
    </script>
</body>
</html>
